services:
  server:
    build:
      context: ./server
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - TZ=${TZ:-UTC}
      - CORS_ORIGIN=*        # server not exposed externally; nginx proxies all API calls
    volumes:
      - server_data:/app/data
    networks:
      - internal
    # No ports binding — only reachable from within Docker network

  client:
    build:
      context: ./client
      args:
        - VITE_APP_NAME=${VITE_APP_NAME}
        - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
        - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
        - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
        - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
        - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
        - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
        - VITE_FIREBASE_VAPID_KEY=${VITE_FIREBASE_VAPID_KEY}
    restart: unless-stopped
    env_file: .env
    networks:
      - internal
    depends_on:
      - server
    # No host port needed — zrok connects directly via Docker network

  zrok:
    build:
      context: ./zrok
    restart: unless-stopped
    stdin_open: true
    tty: true
    user: root
    environment:
      - HOME=/zrok
      - ZROK_ENABLE_TOKEN=${ZROK_ENABLE_TOKEN}
    volumes:
      - zrok_env:/zrok/.zrok
    networks:
      - internal
    depends_on:
      - client

networks:
  internal:
    driver: bridge

volumes:
  server_data:
  zrok_env:
